services:
  db:
    image: mysql:8.0
    container_name: polyclinic_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-polyclinic_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpass}
      MYSQL_USER: ${DB_USER:-polyclinic}
      MYSQL_PASSWORD: ${DB_USER_PASSWORD:-polypass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docs/database_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docs/sample_data.sql:/docker-entrypoint-initdb.d/02-sample.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: polyclinic_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-insecure-dev-key}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DB_NAME: ${DB_NAME:-polyclinic_db}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-rootpass}
      DB_HOST: db
      DB_PORT: 3306
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:5173}
    ports:
      - "8000:8000"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: polyclinic_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
  static_data:
  media_data:
